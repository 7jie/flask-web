<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/newrecipe.css') }}">
{% extends "menu.html" %}
{% block nav %}
    
{% endblock %}
{% block cont %}
<h2>新增食譜</h2>
<div id="con">

<div id="recipe_insert">
<h5><span class="red">*為必填</span></h5>
<p>食譜名稱：<input id="recipe_name"><span class="red">*</span></p>

<p>食譜圖片：<input name="image" id="test1"type="file" accept="image/gif, image/jpeg, image/png"></p>

<div id="img"><img src="" id="img1"></div>
<p>食材：<button class="r1">+</button></p>
<ul id="ing">
<li class="r0"><span>名稱</span><input name="n"class="name"><span class="red">*</span><span id="s">份量</span><input name="s"class="size"><span class="red">*</span><button class="r2">x</button></li>
</ul>


<p>步驟：<button class="r3">+</button></p>
<ul id="st">
<li><input class="step"><span class="red">*</span><button class="r4">x</button></li>
</ul>


<div id="click_recipe"><button id="go">新增食譜</button></div>
</div>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="{{ url_for('static', filename='js/newrecipe.js') }}" type="text/javascript"></script>

{% endblock %}
