<link rel="stylesheet" type="text/css"href="{{ url_for('static',filename='css/store.css')}}">

{% extends "menu.html" %}

{% block cont %}
{% if data !=undefined %}
<div id="ttttt">
<h2>新增食品資料</h2>
<p><a href="{{ url_for('newstore') }}">新增店家及食品</a></p>
<div>
    <h3>已有店家</h3>
</div>
<div id="store">
<form method="post" action="{{url_for('insert_food_mess')}}">

    {% for i in data %}
        <p>{{ i }}<button  name="store_name" type="submit" value="{{i}}">+</button></p>
    {% endfor %}
</form>
</div>

{% endif %}
{% if store_name !=undefined %}
<form method="post"action="{{url_for('food_up_de')}}">

    {% for i in store_name %}
        <p><button name="store_name" type="submit" value="{{i}}">{{ i }}</button></p>
    {% endfor %}
</form>
</div>
</div>
{% endif %}
{% endblock %}
